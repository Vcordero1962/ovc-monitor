name: OVC Heartbeat Diario

on:
  schedule:
    - cron: '15 3,9,15,21 * * *'  # 4x/dia: 11:15pm, 5:15am, 11:15am, 5:15pm Miami (UTC-4)
  workflow_dispatch:

concurrency:
  group: heartbeat-unico
  cancel-in-progress: true   # Si ya hay uno corriendo, cancela el nuevo — nunca duplicados

permissions:
  actions: write   # Necesario para leer/escribir variables del repo (LAST_HB_MSG_ID)

jobs:
  heartbeat:
    runs-on: ubuntu-latest
    timeout-minutes: 2

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instalar requests
        run: pip install requests

      - name: Enviar heartbeat a Telegram
        env:
          TELEGRAM_BOT_TOKEN:  ${{ secrets.TELEGRAM_BOT_TOKEN }}
          ADMIN_CHAT_ID:       ${{ secrets.ADMIN_CHAT_ID }}
          GITHUB_TOKEN:        ${{ secrets.GITHUB_TOKEN }}
          # Último message_id guardado — para borrar el mensaje anterior
          LAST_HB_MSG_ID:      ${{ vars.LAST_HB_MSG_ID }}
        run: python ovc_heartbeat.py

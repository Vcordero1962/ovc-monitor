name: OVC Heartbeat Diario

on:
  schedule:
    - cron: '15 13,21 * * *'  # 2x/dia: ~9:15am y 5:15pm Miami (UTC-4=13,21 UTC)
  workflow_dispatch:

concurrency:
  group: heartbeat-unico
  cancel-in-progress: true   # Si ya hay uno corriendo, cancela el nuevo — nunca duplicados

jobs:
  heartbeat:
    runs-on: ubuntu-latest
    timeout-minutes: 2

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instalar requests
        run: pip install requests

      - name: Enviar heartbeat a Telegram
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID:   ${{ secrets.TELEGRAM_CHAT_ID }}
          GITHUB_TOKEN:       ${{ secrets.GITHUB_TOKEN }}
        run: python ovc_heartbeat.py

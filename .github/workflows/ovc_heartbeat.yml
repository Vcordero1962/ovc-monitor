name: OVC Heartbeat Diario

on:
  schedule:
    - cron: '0 0,4,8,12,16,20 * * *'   # cada 4h: 12am,4am,8am,12pm,4pm,8pm Miami (UTC-4)
  workflow_dispatch:

jobs:
  heartbeat:
    runs-on: ubuntu-latest
    timeout-minutes: 2

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instalar requests
        run: pip install requests

      - name: Enviar heartbeat a Telegram
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID:   ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python ovc_heartbeat.py

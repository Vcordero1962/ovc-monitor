name: OVC Monitor Consular

on:
  schedule:
    - cron: '0,7,13,19,26,32,38,44,51,57 * * * *'
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 6

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-chromium-${{ runner.os }}-v1

      - name: Cache perfil Chromium (sesion persistente anti-WAF)
        uses: actions/cache@v4
        with:
          path: ~/.config/chromium-ovc
          # run_id como clave: siempre guarda el perfil actualizado del run actual
          # restore-keys: restaura el perfil más reciente disponible
          key: chromium-profile-${{ runner.os }}-${{ github.run_id }}
          restore-keys: |
            chromium-profile-${{ runner.os }}-

      - name: Instalar dependencias
        run: pip install -r requirements.txt

      - name: Instalar Chromium
        run: playwright install --with-deps chromium

      - name: Conectar VPN Europa (Netherlands)
        env:
          WG_CONFIG: ${{ secrets.WG_CONFIG_NL }}
        run: |
          if [ -z "$WG_CONFIG" ]; then
            echo "WG_CONFIG_NL no configurado — corriendo sin VPN"
            exit 0
          fi
          sudo apt-get install -y wireguard-tools 2>/dev/null
          # Quitar linea DNS del config — la manejamos manualmente para evitar conflictos
          echo "$WG_CONFIG" | grep -v "^DNS" | sudo tee /etc/wireguard/wg0.conf > /dev/null
          sudo chmod 600 /etc/wireguard/wg0.conf
          # Deshabilitar systemd-resolved
          sudo systemctl stop systemd-resolved 2>/dev/null || true
          sudo rm -f /etc/resolv.conf
          # Levantar WireGuard (sin DNS en config → no toca resolv.conf)
          sudo wg-quick up wg0
          # DNS via Azure hypervisor (168.63.129.16) — bypasa wg0, siempre responde
          printf "nameserver 168.63.129.16\nnameserver 8.8.8.8\n" | sudo tee /etc/resolv.conf
          sleep 3
          # Verificar si el tunel WireGuard realmente pasa trafico
          IP=$(curl -s --max-time 8 https://api.ipify.org || echo "?")
          HANDSHAKE=$(sudo wg show wg0 latest-handshakes 2>/dev/null | awk '{print $2}')
          echo "IP tras VPN: $IP | Handshake epoch: ${HANDSHAKE:-0}"
          if [ "$IP" = "?" ] || [ "${HANDSHAKE:-0}" = "0" ]; then
            echo "AVISO: tunel WireGuard sin trafico (Azure bloquea UDP/51820)"
            echo "Bajando wg0 para restaurar trafico directo (AVC Telegram funciona sin VPN)"
            sudo wg-quick down wg0 2>/dev/null || true
            # Restaurar DNS sin wg0
            printf "nameserver 168.63.129.16\nnameserver 8.8.8.8\n" | sudo tee /etc/resolv.conf
          else
            echo "OK: tunel activo, salida por IP europea"
          fi

      - name: Verificar disponibilidad
        env:
          URL_SISTEMA:           ${{ secrets.URL_SISTEMA }}
          TELEGRAM_BOT_TOKEN:    ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID:      ${{ secrets.TELEGRAM_CHAT_ID }}
          AVC_TRAMITE:           ${{ secrets.AVC_TRAMITE }}
          CHROMIUM_PROFILE_DIR:  /home/runner/.config/chromium-ovc
          # Proxy residencial — IP de hogar europeo para bypassar bloqueo Imperva
          # Formato Webshare rotating: http://user-country-es:pass@p.webshare.io:80
          # Si el secret está vacío, el bot corre sin proxy (AVC funciona igual)
          HTTP_PROXY_URL:        ${{ secrets.HTTP_PROXY_URL }}
        run: python ovc_once.py

      - name: Desconectar VPN
        if: always()
        run: sudo wg-quick down wg0 2>/dev/null || true

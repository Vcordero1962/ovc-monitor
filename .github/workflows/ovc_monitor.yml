name: OVC Monitor Consular

on:
  schedule:
    - cron: '0,7,13,19,26,32,38,44,51,57 * * * *'
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 6

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-chromium-${{ runner.os }}-v1

      - name: Instalar dependencias
        run: pip install -r requirements.txt

      - name: Instalar Chromium
        run: playwright install --with-deps chromium

      - name: Conectar VPN Europa (Netherlands)
        env:
          WG_CONFIG: ${{ secrets.WG_CONFIG_NL }}
        run: |
          if [ -z "$WG_CONFIG" ]; then
            echo "WG_CONFIG_NL no configurado — corriendo sin VPN"
            exit 0
          fi
          sudo apt-get install -y wireguard-tools 2>/dev/null
          # Quitar linea DNS del config — la manejamos manualmente para evitar conflictos
          echo "$WG_CONFIG" | grep -v "^DNS" | sudo tee /etc/wireguard/wg0.conf > /dev/null
          sudo chmod 600 /etc/wireguard/wg0.conf
          # Deshabilitar systemd-resolved
          sudo systemctl stop systemd-resolved 2>/dev/null || true
          sudo rm -f /etc/resolv.conf
          # Levantar WireGuard (sin DNS en config → no toca resolv.conf)
          sudo wg-quick up wg0
          # DNS para Playwright/Chromium (usa DoH automaticamente)
          echo "nameserver 8.8.8.8" | sudo tee /etc/resolv.conf
          echo "nameserver 8.8.4.4" | sudo tee -a /etc/resolv.conf
          sleep 2
          # Pre-resolver via DoH directo a 1.1.1.1 (TCP/443) — UDP/53 bloqueado en ProtonVPN NL
          # curl --resolve evita necesitar DNS para llegar a cloudflare-dns.com
          echo "--- Pre-resolviendo hosts via DoH (1.1.1.1:443) ---"
          for HOST in t.me api.telegram.org; do
            IP=$(curl -s --max-time 8 \
              --resolve "cloudflare-dns.com:443:1.1.1.1" \
              "https://cloudflare-dns.com/dns-query?name=${HOST}&type=A" \
              -H "Accept: application/dns-json" \
              | python3 -c "import sys,json; d=json.load(sys.stdin); print([a['data'] for a in d.get('Answer',[]) if a.get('type')==1][0])" 2>/dev/null || echo "")
            if [ -n "$IP" ]; then
              echo "$IP $HOST" | sudo tee -a /etc/hosts
              echo "OK: $HOST -> $IP"
            else
              echo "FALLO DoH para $HOST"
            fi
          done
          # Verificar IP publica (via ipify directo con IP conocida)
          IP=$(curl -s --max-time 8 --resolve "api.ipify.org:443:54.175.219.8" https://api.ipify.org || echo "?")
          echo "IP tras VPN: $IP"

      - name: Verificar disponibilidad
        env:
          URL_SISTEMA:        ${{ secrets.URL_SISTEMA }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID:   ${{ secrets.TELEGRAM_CHAT_ID }}
          AVC_TRAMITE:        ${{ secrets.AVC_TRAMITE }}
        run: python ovc_once.py

      - name: Desconectar VPN
        if: always()
        run: sudo wg-quick down wg0 2>/dev/null || true

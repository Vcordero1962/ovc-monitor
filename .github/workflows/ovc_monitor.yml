name: OVC Monitor Consular

on:
  # Intervalos irregulares — evita patrón regular detectable por antibot
  # Gaps: 7, 6, 6, 7, 6, 6, 6, 7, 6 minutos + sleep aleatorio interno (10-90s)
  schedule:
    - cron: '0,7,13,19,26,32,38,44,51,57 * * * *'
  workflow_dispatch:   # Lanzar manualmente desde GitHub si hace falta

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 6   # Tiempo extra para VPN connect

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-chromium-${{ runner.os }}-v1

      - name: Instalar dependencias
        run: pip install -r requirements.txt

      - name: Instalar Chromium
        run: playwright install --with-deps chromium

      # ── VPN WireGuard (Windscribe Netherlands) ─────────────────────────────
      # SECRET: WG_CONFIG_NL = contenido del .conf de Windscribe
      # Obtener en: windscribe.com → Mi cuenta → Config Generator → WireGuard → NL
      - name: Conectar VPN Europa (Netherlands)
        env:
          WG_CONFIG: ${{ secrets.WG_CONFIG_NL }}
        run: |
          if [ -z "$WG_CONFIG" ]; then
            echo "WG_CONFIG_NL no configurado — corriendo sin VPN (0 bytes esperado)"
            exit 0
          fi
          sudo apt-get install -y wireguard-tools 2>/dev/null
          echo "$WG_CONFIG" | sudo tee /etc/wireguard/wg0.conf > /dev/null
          sudo chmod 600 /etc/wireguard/wg0.conf
          sudo wg-quick up wg0
          sleep 3
          IP=$(curl -s --max-time 8 https://api.ipify.org || echo "?")
          echo "IP tras VPN: $IP"

      # ── Check de disponibilidad ────────────────────────────────────────────
      - name: Verificar disponibilidad
        env:
          URL_SISTEMA:        ${{ secrets.URL_SISTEMA }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID:   ${{ secrets.TELEGRAM_CHAT_ID }}
          AVC_TRAMITE:        ${{ secrets.AVC_TRAMITE }}
        run: python ovc_once.py

      # ── Desconectar VPN ────────────────────────────────────────────────────
      - name: Desconectar VPN
        if: always()
        run: sudo wg-quick down wg0 2>/dev/null || true
